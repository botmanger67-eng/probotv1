version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: projectbot_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-projectbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-projectbot_secret}
      POSTGRES_DB: ${POSTGRES_DB:-projectbot_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-projectbot} -d ${POSTGRES_DB:-projectbot_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - projectbot_net

  redis:
    image: redis:7-alpine
    container_name: projectbot_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - projectbot_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projectbot_app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      # Database
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-projectbot}:${POSTGRES_PASSWORD:-projectbot_secret}@db:5432/${POSTGRES_DB:-projectbot_dev}"
      # Redis
      REDIS_URL: "redis://:${REDIS_PASSWORD:-}@redis:6379/0"
      # Bot
      BOT_TOKEN: ${BOT_TOKEN:-}
      # JWT
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-60}
      # AI
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Rate Limiting
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy